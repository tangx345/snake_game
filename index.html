<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT's Snake Game</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, #1a1a1a, #000);
      color: #fff;
      font-family: Arial, sans-serif;
    }

    canvas {
      background: #0a0a0a;
      border: 3px solid #888;
      border-radius: 10px;
      box-shadow: 0 0 25px rgba(0,255,0,0.35);
    }

    #hud {
      margin: 6px;
      font-size: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .panel {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    select {
      background: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px;
    }

    .controls {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px;
      gap: 10px;
    }

    .btn {
      background: linear-gradient(145deg, #444, #222);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 26px;
      user-select: none;
      color: #fff;
    }

    .btn:active { background: #777; }
    .empty { visibility: hidden; }

    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      flex-direction: column;
      color: white;
    }

    #overlay button {
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>YT's Snake Game</h2>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Item expires in: <span id="timer">15</span>s</div>

  <div class="panel">
    Speed:
    <select id="speed">
      <option value="slow">Slow</option>
      <option value="normal" selected>Normal</option>
      <option value="fast">Fast</option>
    </select>
  </div>
</div>

<div style="position:relative">
  <canvas id="game" width="672" height="672"></canvas>

  <div id="overlay">
    <h1>You Lose</h1>
    <button onclick="restartGame()">Restart</button>
  </div>
</div>

<div class="controls">
  <div class="empty"></div>
  <div class="btn" data-dir="up">⬆️</div>
  <div class="empty"></div>

  <div class="btn" data-dir="left">⬅️</div>
  <div class="empty"></div>
  <div class="btn" data-dir="right">➡️</div>

  <div class="empty"></div>
  <div class="btn" data-dir="down">⬇️</div>
  <div class="empty"></div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const grid = 32;
const tileCount = canvas.width / grid;

let count = 0;
let running = true;
let score = 0;

function updateScore() {
  document.getElementById('score').textContent = score;
}

let snake, item, itemTimer, lastSpawn;

function init() {
  snake = {
    x: grid * Math.floor(tileCount / 2),
    y: grid * Math.floor(tileCount / 2),
    dx: grid,
    dy: 0,
    cells: [],
    maxCells: 6
  };

  score = 0;
  updateScore();

  spawnItem();
  running = true;
  document.getElementById('overlay').style.display = 'none';
}

function speedFactor() {
  const v = document.getElementById('speed').value;
  if (v === 'fast') return 1.5;
  if (v === 'slow') return 0.5;
  return 1;
}

function spawnItem() {
  const r = Math.random();
  let type = 'apple';
  if (r < 0.6) type = 'apple';
  else if (r < 0.95) type = 'strawberry';
  else type = 'poison';

  item = {
    type,
    x: Math.floor(Math.random() * tileCount) * grid,
    y: Math.floor(Math.random() * tileCount) * grid
  };

  itemTimer = 15;
  lastSpawn = Date.now();
}

function gameOver() {
  running = false;
  document.getElementById('overlay').style.display = 'flex';
}

function reset() {
  init();
}

function drawApple(x, y) {
  ctx.fillStyle = 'red';
  ctx.beginPath();
  ctx.arc(x + grid/2, y + grid/2, grid/2 - 3, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = 'green';
  ctx.beginPath();
  ctx.ellipse(x + grid/2 + 5, y + 6, 5, 3, Math.PI/4, 0, Math.PI*2);
  ctx.fill();
}

function drawPoison(x, y) {
  ctx.fillStyle = 'black';
  ctx.beginPath();
  ctx.arc(x + grid/2, y + grid/2, grid/2 - 3, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = 'purple';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x+6, y+6);
  ctx.lineTo(x+grid-6, y+grid-6);
  ctx.moveTo(x+grid-6, y+6);
  ctx.lineTo(x+6, y+grid-6);
  ctx.stroke();
}

function drawStrawberry(x, y) {
  ctx.font = `${grid}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍓', x + grid/2, y + grid/2);
}

function drawItem() {
  if (item.type === 'apple') drawApple(item.x, item.y);
  else if (item.type === 'poison') drawPoison(item.x, item.y);
  else drawStrawberry(item.x, item.y);
}

function drawSnake() {
  snake.cells.forEach((cell, index) => {
    const shade = 255 - index * 5;
    ctx.fillStyle = `rgb(0, ${shade}, 0)`;
    ctx.beginPath();
    ctx.roundRect(cell.x, cell.y, grid-2, grid-2, 8);
    ctx.fill();

    if (index === 0) {
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(cell.x + 10, cell.y + 12, 4, 0, Math.PI*2);
      ctx.arc(cell.x + 22, cell.y + 12, 4, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.arc(cell.x + 10, cell.y + 12, 2, 0, Math.PI*2);
      ctx.arc(cell.x + 22, cell.y + 12, 2, 0, Math.PI*2);
      ctx.fill();

      ctx.strokeStyle = 'red';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cell.x + grid/2, cell.y + grid/2);
      ctx.lineTo(cell.x + grid/2, cell.y + grid/2 + 10);
      ctx.lineTo(cell.x + grid/2 - 4, cell.y + grid/2 + 14);
      ctx.moveTo(cell.x + grid/2, cell.y + grid/2 + 10);
      ctx.lineTo(cell.x + grid/2 + 4, cell.y + grid/2 + 14);
      ctx.stroke();
    }
  });
}

function loop() {
  requestAnimationFrame(loop);
  if (!running) return;

  const speed = speedFactor();
  const tick = Math.max(2, Math.round(6 / speed));

  if (++count < tick) return;
  count = 0;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  snake.x += snake.dx;
  snake.y += snake.dy;

  if (snake.x < 0) snake.x = canvas.width - grid;
  else if (snake.x >= canvas.width) snake.x = 0;

  if (snake.y < 0) snake.y = canvas.height - grid;
  else if (snake.y >= canvas.height) snake.y = 0;

  snake.cells.unshift({ x: snake.x, y: snake.y });
  if (snake.cells.length > snake.maxCells) snake.cells.pop();

  drawItem();
  drawSnake();

  const elapsed = (Date.now() - lastSpawn) / 1000;
  itemTimer = Math.max(0, 15 - Math.floor(elapsed));
  document.getElementById('timer').textContent = itemTimer;

  if (itemTimer <= 0) spawnItem();

  const head = snake.cells[0];

  if (head.x === item.x && head.y === item.y) {
    score++;
    updateScore();

    if (item.type === 'apple') {
      snake.maxCells++;
    }
    else if (item.type === 'strawberry') {
      snake.maxCells = Math.max(2, snake.maxCells - 1);
      while (snake.cells.length > snake.maxCells) snake.cells.pop();
    }
    else if (item.type === 'poison') {
      gameOver();
      return;
    }

    spawnItem();
  }
}

function restartGame() {
  init();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
  else if (e.key === 'ArrowUp' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
  else if (e.key === 'ArrowRight' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
  else if (e.key === 'ArrowDown' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
});

function bindControls() {
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const dir = btn.dataset.dir;
      if (dir === 'left' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
      else if (dir === 'up' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
      else if (dir === 'right' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
      else if (dir === 'down' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
    });
  });
}

init();
bindControls();
requestAnimationFrame(loop);
</script>
</body>
</html>
